<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo CMS Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- CSRF Token for future API requests -->
    {% csrf_token %}
    <script>
        // Global helper to retrieve the CSRF token from the template
        const getCsrfToken = () => document.querySelector('[name=csrfmiddlewaretoken]').value;
        const API_BASE_URL = '/api/'; // Django API root
    </script>

    <style>
        /* Custom scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Custom Resizer Handle */
        .resize-handle {
            cursor: ew-resize;
            touch-action: none;
        }
    </style>
</head>
{% verbatim %}

<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden">
    <div id="app" class="h-screen flex bg-slate-50" v-cloak>
        <!-- Toast Notifications -->
        <div class="fixed top-20 right-4 z-[9999] space-y-2">
            <div v-for="toast in toasts" :key="toast.id" :class="[
                    'min-w-[300px] max-w-md p-4 rounded-lg shadow-lg transform transition-all duration-300',
                    'flex items-start space-x-3',
                    toast.type === 'success' ? 'bg-green-50 border border-green-200' :
                    toast.type === 'error' ? 'bg-red-50 border border-red-200' :
                    'bg-blue-50 border border-blue-200'
                ]">
                <icon :name="toast.type === 'success' ? 'check-circle' : toast.type === 'error' ? 'x-circle' : 'info'"
                    :size="20"
                    :class="toast.type === 'success' ? 'text-green-600' : toast.type === 'error' ? 'text-red-600' : 'text-blue-600'">
                </icon>
                <div class="flex-1">
                    <p :class="[
                        'font-medium text-sm',
                        toast.type === 'success' ? 'text-green-900' :
                        toast.type === 'error' ? 'text-red-900' :
                        'text-blue-900'
                    ]">{{ toast.message }}</p>
                    <p v-if="toast.detail" :class="[
                        'text-xs mt-1',
                        toast.type === 'success' ? 'text-green-700' :
                        toast.type === 'error' ? 'text-red-700' :
                        'text-blue-700'
                    ]">{{ toast.detail }}</p>
                </div>
                <button @click="removeToast(toast.id)" :class="[
                        'p-1 rounded hover:bg-white/50 transition-colors',
                        toast.type === 'success' ? 'text-green-600' :
                        toast.type === 'error' ? 'text-red-600' :
                        'text-blue-600'
                    ]">
                    <icon name="x" :size="16"></icon>
                </button>
            </div>
        </div>

        <!-- Loading Spinner while fetching initial data -->
        <div v-if="!isLoaded" class="absolute inset-0 bg-white/80 z-50 flex items-center justify-center flex-col">
            <svg class="animate-spin -ml-1 mr-3 h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p class="mt-4 text-lg text-slate-700">Loading CMS Data from Django...</p>
        </div>

        <!-- CMS Editor UI (Visible when loaded) -->
        <template v-else>
            <!-- LEFT SIDEBAR -->
            <aside class="w-80 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 z-20 shadow-sm">
                <!-- App Header -->
                <div class="p-4 border-b border-slate-100 flex items-center space-x-2">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                        <icon name="layout" :size="18"></icon>
                    </div>
                    <div>
                        <h1 class="font-bold text-slate-800 leading-tight">HugoCMS</h1>
                        <p class="text-xs text-slate-500">Django + Vue Mode</p>
                    </div>
                </div>

                <!-- Sidebar Tabs -->
                <div class="flex items-center border-b border-slate-200 bg-slate-50/50">
                    <button v-for="tab in ['pages', 'blocks', 'meta']" :key="tab" @click="sidebarTab = tab"
                        class="flex-1 py-3 text-xs font-bold uppercase tracking-wide transition-colors relative"
                        :class="sidebarTab === tab ? 'text-indigo-600 bg-white' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'">
                        {{ tab }}
                        <div v-if="sidebarTab === tab" class="absolute bottom-0 left-0 w-full h-0.5 bg-indigo-600">
                        </div>
                    </button>
                </div>

                <!-- Sidebar Content Area -->
                <div class="flex-1 overflow-y-auto bg-white">

                    <!-- PAGES TAB -->
                    <div v-if="sidebarTab === 'pages'" class="p-4">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">All Pages</h3>
                            <button @click="createNewPage"
                                class="text-slate-400 hover:text-indigo-600 transition-colors">
                                <icon name="plus" :size="16"></icon>
                            </button>
                        </div>
                        <div class="space-y-1">
                            <div v-for="page in pages" :key="page.id" @click="setActivePage(page.id)"
                                class="group flex items-center justify-between px-3 py-2 rounded-md cursor-pointer text-sm transition-all"
                                :class="activePageId === page.id ? 'bg-indigo-50 text-indigo-700 font-medium border border-indigo-100' : 'hover:bg-slate-50 text-slate-600 border border-transparent'">
                                <div class="flex items-center space-x-3 truncate">
                                    <icon name="file-text" :size="16"
                                        :class="activePageId === page.id ? 'text-indigo-500' : 'text-slate-400'"></icon>
                                    <span class="truncate">{{ page.title }}</span>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <span class="w-2 h-2 rounded-full"
                                        :class="page.status === 'published' ? 'bg-emerald-400' : 'bg-amber-400'"></span>
                                    <icon name="more-vertical" :size="14"
                                        class="opacity-0 group-hover:opacity-100 text-slate-400"></icon>
                                </div>
                            </div>
                        </div>

                        <button @click="createNewPage"
                            class="mt-4 w-full py-2 border border-dashed border-slate-300 rounded-md text-xs text-slate-500 hover:border-indigo-400 hover:text-indigo-600 transition-colors flex items-center justify-center space-x-1">
                            <icon name="plus" :size="12"></icon>
                            <span>Create New Page</span>
                        </button>
                    </div>

                    <!-- BLOCKS TAB -->
                    <div v-if="sidebarTab === 'blocks'" class="p-4">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Component Library
                            </h3>
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">Drag to
                                Canvas</span>
                        </div>
                        <div class="space-y-2">
                            <div v-for="comp in componentLibrary" :key="comp.id" draggable="true"
                                @dragstart="handleDragStartNew($event, comp.id)"
                                class="bg-white border border-slate-200 hover:border-indigo-300 hover:shadow-sm p-3 rounded-md cursor-grab active:cursor-grabbing flex items-center space-x-3 transition-all group">
                                <div class="text-slate-400 group-hover:text-indigo-500 transition-colors">
                                    <icon :name="comp.icon" :size="20"></icon>
                                </div>
                                <div>
                                    <span class="text-sm font-medium text-slate-700 block">{{ comp.label }}</span>
                                    <span class="text-[10px] text-slate-400 block">
                                        {{ comp.has_visual_preview ? 'Visual Block' : 'Shortcode' }}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="mt-6 p-3 bg-indigo-50 rounded-md border border-indigo-100 text-xs text-indigo-700">
                            <div class="font-bold mb-1">Tip:</div>
                            New components are loaded from Django's BlockDefinition model.
                        </div>
                    </div>

                    <!-- META TAB -->
                    <div v-if="sidebarTab === 'meta'" class="p-4 space-y-5">
                        <div v-if="activePage">
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Frontmatter &
                                SEO</h3>

                            <!-- Title -->
                            <div class="space-y-1">
                                <label class="text-xs font-medium text-slate-600">Page Title</label>
                                <input v-model="activePage.title" type="text"
                                    class="w-full text-sm border border-slate-200 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow" />
                            </div>

                            <!-- Slug -->
                            <div class="space-y-1">
                                <label class="text-xs font-medium text-slate-600">URL Slug</label>
                                <div class="flex items-center">
                                    <span
                                        class="bg-slate-50 border border-r-0 border-slate-200 text-slate-400 text-xs px-2 py-2 rounded-l-md font-mono">/</span>
                                    <input v-model="activePage.slug" type="text"
                                        class="flex-1 w-full text-sm border border-slate-200 rounded-r-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow font-mono text-slate-600" />
                                </div>
                            </div>

                            <!-- Date -->
                            <div class="space-y-1">
                                <label class="text-xs font-medium text-slate-600">Publish Date</label>
                                <input v-model="activePage.date" type="date"
                                    class="w-full text-sm border border-slate-200 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow text-slate-600" />
                            </div>

                            <!-- Description -->
                            <div class="space-y-1">
                                <label class="text-xs font-medium text-slate-600">Description</label>
                                <textarea v-model="activePage.description" rows="3"
                                    class="w-full text-sm border border-slate-200 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow resize-none"></textarea>
                            </div>

                            <!-- Tags -->
                            <div class="space-y-1">
                                <label class="text-xs font-medium text-slate-600">Tags (comma separated)</label>
                                <input :value="activePage.tags ? activePage.tags.join(', ') : ''"
                                    @input="e => activePage.tags = e.target.value.split(',').map(t => t.trim()).filter(t => t.length > 0)"
                                    type="text" placeholder="e.g. news, tech"
                                    class="w-full text-sm border border-slate-200 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow" />
                            </div>

                            <div class="border-t border-slate-100 my-4"></div>

                            <!-- Layout -->
                            <div class="space-y-1">
                                <label class="text-xs font-medium text-slate-600">Layout Template</label>
                                <div class="relative">
                                    <select v-model="activePage.layout"
                                        class="w-full text-sm border border-slate-200 rounded-md px-3 py-2 pr-8 appearance-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white">
                                        <option v-for="layout in layoutTemplates" :key="layout.id" :value="layout.id">
                                            {{ layout.label }}
                                        </option>
                                    </select>
                                    <icon name="chevron-down" :size="14"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                    </icon>
                                </div>
                            </div>

                            <!-- Status -->
                            <div class="space-y-1">
                                <label class="text-xs font-medium text-slate-600">Status</label>
                                <div class="flex space-x-2">
                                    <button @click="activePage.status = 'published'"
                                        class="flex-1 py-1.5 text-xs rounded border transition-colors flex items-center justify-center space-x-1"
                                        :class="activePage.status === 'published' ? 'bg-emerald-50 border-emerald-200 text-emerald-700 font-medium' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'">
                                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"
                                            v-if="activePage.status === 'published'"></div>
                                        <span>Published</span>
                                    </button>
                                    <button @click="activePage.status = 'draft'"
                                        class="flex-1 py-1.5 text-xs rounded border transition-colors flex items-center justify-center space-x-1"
                                        :class="activePage.status === 'draft' ? 'bg-amber-50 border-amber-200 text-amber-700 font-medium' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'">
                                        <div class="w-1.5 h-1.5 rounded-full bg-amber-500"
                                            v-if="activePage.status === 'draft'"></div>
                                        <span>Draft</span>
                                    </button>
                                </div>
                            </div>

                        </div>
                        <div v-else class="text-center text-slate-400 mt-10">
                            No page selected
                        </div>
                    </div>

                </div>

                <!-- Bottom User Profile -->
                <div class="p-4 border-t border-slate-200 bg-slate-50">
                    <div class="flex items-center space-x-3">
                        <div
                            class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-white text-xs font-bold">
                            JD
                        </div>
                        <div class="flex-1">
                            <div class="text-sm font-medium text-slate-900">John Doe</div>
                            <div class="text-xs text-slate-500">Admin</div>
                        </div>
                        <icon name="settings" :size="16" class="text-slate-400 cursor-pointer hover:text-slate-600">
                        </icon>
                    </div>
                </div>
            </aside>

            <!-- MAIN CONTENT AREA -->
            <main class="flex-1 flex flex-col h-screen min-w-0 bg-slate-100">

                <!-- Top Bar -->
                <header
                    class="relative h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shadow-sm z-10">
                    <!-- LEFT SECTION -->
                    <div v-if="activePage" class="flex items-center space-x-4 z-20">
                        <div class="flex flex-col">
                            <h2 class="text-lg font-semibold text-slate-800">{{ activePage.title }}</h2>
                            <div class="flex items-center text-xs text-slate-500 mt-0.5 space-x-2">
                                <span class="text-slate-400">url:</span>
                                <span class="font-mono text-slate-600">{{ activePage.slug }}</span>
                                <span class="text-slate-300">|</span>
                                <span class="font-mono text-slate-400">layout: {{ activePage.layout }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- CENTER SECTION (Absolute Positioned) -->
                    <div
                        class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center bg-slate-100 rounded-lg p-1">
                        <button @click="viewMode = 'editor'"
                            class="px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center space-x-2"
                            :class="viewMode === 'editor' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                            <icon name="edit-3" :size="14"></icon>
                            <span>Editor</span>
                        </button>
                        <button @click="viewMode = 'preview'"
                            class="px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center space-x-2"
                            :class="viewMode === 'preview' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                            <icon name="eye" :size="14"></icon>
                            <span>Preview</span>
                        </button>
                        <button @click="viewMode = 'code'"
                            class="px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center space-x-2"
                            :class="viewMode === 'code' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'">
                            <icon name="code" :size="14"></icon>
                            <span>Code</span>
                        </button>
                    </div>

                    <!-- RIGHT SECTION -->
                    <div class="flex items-center space-x-3 z-20">
                        <button @click="savePageContent"
                            class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-md text-sm font-medium hover:bg-slate-50 transition-colors flex items-center space-x-2">
                            <icon name="save" :size="16"></icon>
                            <span>Save Draft</span>
                        </button>
                        <button @click="publishSite"
                            class="px-4 py-2 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700 shadow-sm transition-colors flex items-center space-x-2">
                            <icon name="send" :size="16"></icon>
                            <span>Publish</span>
                        </button>
                    </div>
                </header>

                <!-- Canvas Area -->
                <div class="flex-1 overflow-auto p-8 relative">

                    <!-- Code View -->
                    <div v-if="viewMode === 'code'"
                        class="max-w-4xl mx-auto bg-slate-800 rounded-lg shadow-xl overflow-hidden text-slate-300 font-mono text-sm">
                        <div class="bg-slate-900 px-4 py-2 border-b border-slate-700 flex justify-between">
                            <span>config.toml</span>
                            <span class="text-xs text-slate-500">Read-only generated view</span>
                        </div>
                        <div class="p-6 whitespace-pre overflow-x-auto">{{ generateConfig }}</div>
                    </div>

                    <!-- Editor/Preview View -->
                    <div v-else
                        class="max-w-5xl mx-auto min-h-[800px] bg-white shadow-xl rounded-lg border border-slate-200 flex flex-col transition-all duration-300"
                        :class="viewMode === 'preview' ? 'scale-[1.02]' : ''">

                        <!-- Header Zone (Global) - Render if layout allows -->
                        <drop-zone v-if="getZoneConfig('header')" :title="'Site Header (Global)'" zone="header"
                            :blocks="activeContent.header" :is-active="viewMode === 'editor'"
                            :selected-id="selectedBlockId" @drop-item="handleDrop" @select-block="setSelectedBlockId"
                            @drag-start-block="handleDragStartExisting"
                            :class="getZoneConfig('header')?.cssClasses || ''"
                            :style="{ order: getZoneConfig('header')?.order || 0 }"></drop-zone>

                        <!-- Main Content Canvas -->
                        <div class="flex flex-1" style="display: flex;">
                            <!-- Sidebar Zone (Page Specific) - Render if layout has sidebar -->
                            <div v-if="getZoneConfig('sidebar')"
                                :class="getZoneConfig('sidebar')?.width + ' ' + (getZoneConfig('sidebar')?.cssClasses || '')"
                                :style="{ order: getZoneConfig('sidebar')?.order || 0 }">
                                <drop-zone title="Sidebar" zone="sidebar" :blocks="activeContent.sidebar"
                                    :is-active="viewMode === 'editor'" :selected-id="selectedBlockId"
                                    class="h-full min-h-[400px]" @drop-item="handleDrop"
                                    @select-block="setSelectedBlockId"
                                    @drag-start-block="handleDragStartExisting"></drop-zone>
                            </div>

                            <!-- Page Content Zone (Main) -->
                            <div class="flex-1 min-h-[400px]" :style="{ order: getZoneConfig('main')?.order || 2 }">
                                <drop-zone title="Page Content" zone="main" :blocks="activeContent.main"
                                    :is-active="viewMode === 'editor'" :selected-id="selectedBlockId" class="h-full"
                                    @drop-item="handleDrop" @select-block="setSelectedBlockId"
                                    @drag-start-block="handleDragStartExisting"></drop-zone>
                            </div>
                        </div>

                        <!-- Footer Zone (Global) - Render if layout allows -->
                        <drop-zone v-if="getZoneConfig('footer')" :title="'Site Footer (Global)'" zone="footer"
                            :blocks="activeContent.footer" :is-active="viewMode === 'editor'"
                            :selected-id="selectedBlockId" @drop-item="handleDrop" @select-block="setSelectedBlockId"
                            @drag-start-block="handleDragStartExisting"
                            :class="getZoneConfig('footer')?.cssClasses || ''"
                            :style="{ order: getZoneConfig('footer')?.order || 0 }"></drop-zone>
                    </div>
                </div>
            </main>

            <!-- RIGHT PROPERTY SIDEBAR -->
            <aside v-if="viewMode === 'editor' && selectedBlock"
                class="w-80 bg-white border-l border-slate-200 shadow-xl z-30 flex flex-col transition-all">
                <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="font-bold text-slate-800">Edit Component</h3>
                        <span class="text-xs text-slate-500 uppercase tracking-wide">{{ selectedBlock.label ||
                            selectedBlock.type }}</span>
                    </div>
                    <button @click="deleteBlock(selectedBlock.id)"
                        class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-md transition-colors"
                        title="Delete Block">
                        <icon name="trash-2" :size="16"></icon>
                    </button>
                </div>

                <div class="p-6 space-y-6 flex-1 overflow-y-auto">
                    <!-- Column Resizer Parameters for flex_columns -->
                    <div v-if="selectedBlock.type === 'flex_columns'">
                        <div class="space-y-4">
                            <h4 class="text-sm font-semibold text-slate-700">Settings</h4>

                            <!-- Column Count Control (Slider replacement for UX) -->
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Count</label>
                                <div class="flex items-center space-x-3">
                                    <input type="number" min="1" max="6"
                                        :value="getColWidths(selectedBlock.children).length"
                                        @input="e => updateColCount(selectedBlock.id, parseInt(e.target.value))"
                                        class="w-16 text-sm border border-slate-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-center" />
                                    <div class="flex-1 h-2 bg-indigo-100 rounded-full">
                                        <div class="h-full bg-indigo-500 rounded-full"
                                            :style="{ width: ((getColWidths(selectedBlock.children).length / 6) * 100) + '%' }">
                                        </div>
                                    </div>
                                    <span class="text-xs text-slate-500">6</span>
                                </div>
                            </div>

                            <!-- Individual Width Controls -->
                            <div class="space-y-2">
                                <h4 class="text-sm font-semibold text-slate-700 mt-4">Widths</h4>
                                <div v-for="(width, index) in getColWidths(selectedBlock.children)" :key="index"
                                    class="flex items-center space-x-3">
                                    <label class="w-12 text-xs font-mono text-slate-600">Col {{ index + 1 }}</label>
                                    <div class="flex-1 relative">
                                        <input type="range" min="5" max="100" :value="width"
                                            @input="e => updateSingleWidth(selectedBlock.id, index, parseFloat(e.target.value))"
                                            class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer range-sm" />
                                        <span
                                            class="absolute right-0 top-1/2 transform -translate-y-1/2 text-xs font-mono text-slate-500">{{
                                            width.toFixed(1) }}%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Special Editor for Menu Block Items -->
                    <div v-if="selectedBlock.type === 'menu'" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Menu Items</label>
                            <div class="space-y-2">
                                <div v-for="(item, index) in selectedBlock.params.items" :key="index"
                                    class="p-3 bg-slate-50 rounded-md border border-slate-200">
                                    <div class="flex items-center justify-between mb-2">
                                        <span class="text-xs font-medium text-slate-600">Item {{ index + 1 }}</span>
                                        <button @click="selectedBlock.params.items.splice(index, 1)"

                        <div class="space-y-3">

    </div>

    <!-- Scripts -->
    <script>
        // --- UUID Polyfill ---
        const uuid = {
            v4: () => {
                let d = Date.now();
                if(typeof performance !== 'undefined' && typeof performance.now === 'function') {
                    d += performance.now(); //use high-precision timer if available
                }
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    let r = (d + Math.random() * 16) % 16 | 0;
                    d = Math.floor(d / 16);
                    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
                });
            }
        };

        const {createApp, ref, computed, onMounted, watch, nextTick} = Vue;

        // --- ICON COMPONENT ---
        const ICONS = {
            'layout': '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="9" y2="21"/>',
            'file-text': '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/>',
            'type': '<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/>',
            'image': '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
            'columns': '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="12" x2="12" y1="3" y2="21"/>',
            'save': '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
            'send': '<line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
            'more-vertical': '<circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>',
            'plus': '<path d="M5 12h14"/><path d="M12 5v14"/>',
            'settings': '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l-.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
            'code': '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
            'eye': '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
            'edit-3': '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
            'trash-2': '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
            'move': '<polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 15 22 12 19 9"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/>',
            'chevron-down': '<polyline points="6 9 12 15 18 9"/>',
            'video': '<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>',
            'alert-triangle': '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'
        };

        const Icon = {
            props: ['name', 'size'],
            template: `
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    :width="size || 24" 
                    :height="size || 24" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round"
                    v-html="path"
                >
                </svg>
            `,
            computed: {
                path() {
                    return ICONS[this.name] || '';
                }
            }
        };

        // --- FORWARD DECLARATIONS (Required due to mutual recursion) ---
        let DropZone;
        let BlockRenderer;

        // --- DROP ZONE COMPONENT ---
        DropZone = {
            name: 'DropZone',
            props: ['title', 'zone', 'blocks', 'isActive', 'selectedId', 'isNested', 'parentBlockId'],
            components: {}, // Will be populated after BlockRenderer is defined
            template: `
                <div 
                    class="relative transition-colors"
                    :class="{ 'p-4': !isNested, 'p-1': isNested }"
                    @dragover.prevent="handleDragOver"
                    @dragleave="handleDragLeave"
                    @drop="handleDropInternal"
                >
                    <!-- Zone Label -->
                    <div v-if="isActive && !isNested" class="absolute top-0 left-0 -translate-y-1/2 ml-4 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider z-10 border"
                         :class="isOver ? 'bg-indigo-100 text-indigo-700 border-indigo-300' : 'bg-slate-100 text-slate-400 border-slate-200'">
                        {{ title }}
                    </div>

                    <!-- Dashed Container -->
                    <div class="h-full min-h-[120px] rounded-lg transition-all duration-200 space-y-4"
                         ref="container"
                         :class="containerClass">
                        
                        <!-- Empty Message / Drop Target (Only visible if blocks is empty) -->
                        <div v-if="blocks.length === 0 && isActive && isNested" 
                            class="h-full min-h-[80px] flex flex-col items-center justify-center text-slate-400 p-4 border-2 border-dashed border-transparent transition-colors"
                            :class="{ 'border-indigo-400 bg-indigo-50/50': isOver && blocks.length === 0 }">
                            <span class="text-sm italic">Select</span>
                        </div>
                        
                        <!-- Loop through blocks -->
                        <template v-for="(block, index) in blocks" :key="block.id">
                            <!-- Placeholder when inserting BEFORE this block -->
                            <div v-if="isActive && isOver && dragOverIndex === index" 
                                 class="h-16 bg-indigo-50 border-2 border-dashed border-indigo-400 rounded-lg pointer-events-none opacity-60 transition-all">
                            </div>

                            <block-renderer 
                                :block="block" 
                                :is-selected="selectedId === block.id"
                                :is-editable="isActive"
                                :col-index="isNested ? getColIndex(zone) : null"
                                @select="$emit('select-block', $event)"
                                @drag-start="emitDragStart($event, block.id)"
                                @drag-start-block="handleNestedDragStartReemit"
                                @nested-drop="handleNestedDropReemit"
                            ></block-renderer>
                        </template>

                        <!-- Placeholder when inserting at END -->
                        <div v-if="isActive && isOver && blocks.length > 0 && dragOverIndex === blocks.length" 
                             class="h-16 bg-indigo-50 border-2 border-dashed border-indigo-400 rounded-lg pointer-events-none opacity-60 transition-all">
                        </div>

                        <!-- Main Drop Zone empty state (Non-nested only) -->
                         <div v-if="blocks.length === 0 && isActive && !isNested" class="h-full flex flex-col items-center justify-center text-slate-400 pointer-events-none">
                            <span class="text-sm italic">Empty {{ title }} (Drop blocks here)</span>
                        </div>
                    </div>
                </div>
            `,
            data() {
                return {
                    isOver: false,
                    dragOverIndex: -1
                };
            },
            computed: {
                containerClass() {
                    if(!this.isActive) return '';
                    // The dashed border styling for the container is only applied when blocks are empty OR it's a nested dropzone (to make the border always visible)
                    const isGlobalDropTarget = this.blocks.length === 0 && !this.isNested;
                    const isNestedDropTarget = this.isNested;

                    const base = this.isNested ? 'p-2' : 'p-4';

                    return `${base} ${isGlobalDropTarget || isNestedDropTarget ? 'border-2 border-dashed' : ''} 
                            ${this.isOver && (isGlobalDropTarget || isNestedDropTarget) ? 'border-indigo-400 bg-indigo-50/50' : (isGlobalDropTarget ? 'border-slate-200' : (isNestedDropTarget ? 'border-slate-300' : ''))}`;
                }
            },
            methods: {
                handleDragOver(e) {
                    // Stop propagation if this is a nested zone to prevent parent zones from showing placeholders
                    if(this.isNested) {
                        e.stopPropagation();
                    }

                    this.isOver = true;

                    const container = this.$refs.container;
                    if(!container) return;

                    // Filter only the block elements (those with data-block-id)
                    const children = Array.from(container.children).filter(el => el.hasAttribute('data-block-id'));

                    const mouseY = e.clientY;
                    let foundIndex = children.length; // Default to end

                    for(let i = 0; i < children.length; i++) {
                        const rect = children[i].getBoundingClientRect();
                        const midY = rect.top + (rect.height / 2);

                        if(mouseY < midY) {
                            foundIndex = i;
                            break;
                        }
                    }
                    this.dragOverIndex = foundIndex;
                },
                handleDragLeave(e) {
                    // Stop propagation if this is a nested zone
                    if(this.isNested) {
                        e.stopPropagation();
                    }

                    if(e.relatedTarget && this.$el.contains(e.relatedTarget)) {
                        return;
                    }
                    this.isOver = false;
                    this.dragOverIndex = -1;
                },
                handleDropInternal(e) {
                    e.preventDefault();
                    e.stopPropagation(); // Prevent event from bubbling to parent drop zones

                    this.isOver = false;
                    let targetIndex = this.dragOverIndex;
                    if(targetIndex === -1) targetIndex = this.blocks.length;

                    this.dragOverIndex = -1;

                    // Main drop re-emits to main Vue instance
                    this.$emit('drop-item', e, this.zone, targetIndex, this.parentBlockId);
                },
                emitDragStart(e, blockId) {
                    this.$emit('drag-start-block', e, blockId, this.zone, this.parentBlockId);
                },
                handleNestedDragStartReemit(e, blockId, zone, parentBlockId) {
                    // If zone/parent are missing (from direct child), use this DropZone's info.
                    // If they are present (bubbled up), preserve them.
                    const finalZone = zone || this.zone;
                    const finalParentId = parentBlockId !== undefined ? parentBlockId : this.parentBlockId;
                    this.$emit('drag-start-block', e, blockId, finalZone, finalParentId);
                },
                handleNestedDropReemit(e, targetZone, targetIndex, parentBlockId) {
                    this.$emit('drop-item', e, targetZone, targetIndex, parentBlockId);
                },
                getColIndex(zone) {
                    const match = zone.match(/col_(\d+)/);
                    return match ? parseInt(match[1]) : null;
                }
            }
        };


        // --- BLOCK RENDERER COMPONENT ---
        BlockRenderer = {
            name: 'BlockRenderer',
            props: ['block', 'isSelected', 'isEditable', 'colIndex'],
            components: {}, // Will be populated after definition
            template: `
                <div 
                    :class="wrapperClass"
                    @click="handleClick"
                    :draggable="isEditable"
                    @dragstart="handleDragStart"
                    :data-block-id="block.id"
                >
                    <!-- Drag Handle -->

                    <div v-if="isEditable" class="absolute inset-0 z-0"></div>

                    </div>

                    <div v-else-if="block.type === 'menu'" 
                        :class="[
                            'w-full',
                            block.params.position === 'overlay' ? 'absolute top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-sm shadow-md' :
                            block.params.position === 'fixed' ? 'fixed top-0 left-0 right-0 z-40 bg-white shadow-md' :
                            ''
                        ]" 
                        :data-block-id="block.id">
                        <!-- Hamburger/Responsive Menu -->
                        <div v-if="block.params.responsive === 'true' || block.params.responsive === true">
                            <div :class="[
                                'flex p-4',
                                block.params.alignment === 'center' ? 'justify-center' : 
                                block.params.alignment === 'right' ? 'justify-end' : 'justify-start'
                            ]">
                                <div class="relative">
                                    <!-- Hamburger Button -->
                                <button @click="block._menuOpen = !block._menuOpen"
                                    class="p-3 rounded-md hover:bg-slate-100 transition-colors flex items-center space-x-2">
                                    <div class="flex flex-col space-y-1.5">
                                        <span class="block w-6 h-0.5 bg-slate-700"></span>
                                        <span class="block w-6 h-0.5 bg-slate-700"></span>
                                        <span class="block w-6 h-0.5 bg-slate-700"></span>
                                    </div>
                                    <span class="text-sm font-medium text-slate-700">Menu</span>
                                </button>
                                
                                <!-- Dropdown Menu (from top) -->
                                <div v-if="block.params.hamburgerDirection === 'dropdown' || !block.params.hamburgerDirection"
                                    v-show="block._menuOpen"
                                    class="absolute top-full left-0 mt-2 bg-white border border-slate-200 rounded-lg shadow-lg min-w-[200px] z-50">
                                    <nav class="flex flex-col p-2">
                                        <a v-for="(item, index) in block.params.items" :key="index"
                                            :href="item.url"
                                            :class="[
                                                'px-4 py-2 transition-colors text-slate-700',
                                                block.params.style === 'pills' ? 'rounded-full bg-slate-100 hover:bg-indigo-100 hover:text-indigo-700 mb-1' :
                                                block.params.style === 'underline' ? 'border-b border-transparent hover:border-indigo-600' :
                                                'rounded-md hover:bg-slate-100'
                                            ]">

                                <cite class="font-semibold not-italic">— {{ block.params.author }}</cite>
                            </footer>

                    </div>

                    <!-- GENERIC RENDERER (For unknown blocks) -->
                    <div v-else class="p-4 bg-white border border-slate-100 rounded-lg shadow-sm m-1">
                        <div class="flex items-center space-x-2 text-slate-500 mb-3 border-b border-slate-100 pb-2">
                            <icon :name="getDefinition(block.type).icon || 'code'" :size="16"></icon>
                            <span class="text-xs font-bold uppercase tracking-wider">{{ getDefinition(block.type).label || block.type }}</span>
                        </div>
                        <div class="space-y-1.5">
                            <div v-for="(val, key) in block.params" :key="key" class="flex items-start text-sm">
                                <span class="text-slate-400 w-24 font-mono text-xs pt-0.5 uppercase">{{ key }}:</span>
                                <span class="text-slate-700 truncate flex-1 font-medium">{{ val }}</span>

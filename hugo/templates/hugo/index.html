                    </div>
                </div>
            `,
            setup(props, {emit}) {
                // Fix: Explicitly inject required functions
                const {findBlockAndParent, updateBlock, componentLibrary, getColWidths, updateSingleWidth} = Vue.inject('cmsState');

                // --- Column Structure Helper (Flex Columns) ---
                const getColumnStructure = (block) => {
                    const widthsStr = block.params.col_widths || '50.0, 50.0';
                    const widths = widthsStr.split(',').map(w => parseFloat(w.trim()));

                    // Group children blocks by their column placement_key (col_0, col_1, etc.)
                    const columnChildrenMap = {};
                    // Group all children from the Django API response
                    (block.children || []).forEach(c => {
                        if(!columnChildrenMap[c.placement_key]) {
                            columnChildrenMap[c.placement_key] = [];
                        }
                        columnChildrenMap[c.placement_key].push(c);
                    });

                    // Ensure structure always returns the number of columns defined by col_widths
                    const structure = widths.map((width, index) => {
                        const placement_key = `col_${index}`;
                        return {
                            width_percent: width,
                            // Ensure blocks are sorted by sort_order
                            blocks: columnChildrenMap[placement_key] ? columnChildrenMap[placement_key].sort((a, b) => a.sort_order - b.sort_order) : []
                        };
                    });

                    return structure;
                };

                // --- Drag and Drop Handlers for Nested Content ---
                const handleNestedDrop = (e, targetZone, targetIndex, parentBlockId) => {
                    // Stop propagation to prevent parent drop zones from also handling this event
                    e.stopPropagation();
                    // Re-emit the drop event with parent context
                    emit('nested-drop', e, targetZone, targetIndex, parentBlockId);
                };

                // --- Resizer Logic ---
                const startResize = (e, colIndex) => {
                    e.stopPropagation();
                    e.preventDefault();

                    const widthsStr = props.block.params.col_widths || '50.0, 50.0';
                    const currentWidths = widthsStr.split(',').map(w => parseFloat(w.trim()));

                    if(colIndex >= currentWidths.length - 1) return; // Cannot resize the last column

                    const container = e.currentTarget.parentElement;
                    const containerRect = container.getBoundingClientRect();
                    const startX = e.clientX || e.touches[0].clientX;

                    // Get the initial widths of the columns involved in the resize
                    const col1El = container.children[colIndex * 2];
                    const col2El = container.children[colIndex * 2 + 2];
                    const col1StartWidth = col1El.offsetWidth;
                    const col2StartWidth = col2El.offsetWidth;
                    const totalWidth = col1StartWidth + col2StartWidth;

                    const mouseMove = (e) => {
                        const currentX = e.clientX || e.touches[0].clientX;
                        const deltaX = currentX - startX;

                        // Calculate new pixel widths
                        let newCol1Width = col1StartWidth + deltaX;
                        let newCol2Width = col2StartWidth - deltaX;

                        // Prevent columns from shrinking too much (min width limit)
                        const MIN_WIDTH = 50;
                        if(newCol1Width < MIN_WIDTH) {
                            newCol1Width = MIN_WIDTH;
                        }
                        if(newCol2Width < MIN_WIDTH) {
                            newCol2Width = MIN_WIDTH;
                        }

                        // Recalculate based on total width to ensure sum is stable
                        if(newCol1Width + newCol2Width > totalWidth) {
                            newCol1Width = totalWidth - newCol2Width;
                        } else if(newCol1Width + newCol2Width < totalWidth) {
                            newCol2Width = totalWidth - newCol1Width;
                        }

                        // Convert back to percentages
                        let finalCol1Percent = Math.round((newCol1Width / containerRect.width) * 1000) / 10;
                        let finalCol2Percent = Math.round((newCol2Width / containerRect.width) * 1000) / 10;

                        // Use the injected helper function to update and normalize widths

                        // 1. Update colIndex
                        updateSingleWidth(props.block.id, colIndex, finalCol1Percent);
                        // 2. Update colIndex + 1
                        updateSingleWidth(props.block.id, colIndex + 1, finalCol2Percent);

                    };

                    const mouseUp = () => {
                        document.removeEventListener('mousemove', mouseMove);
                        document.removeEventListener('mouseup', mouseUp);
                        document.removeEventListener('touchmove', mouseMove);
                        document.removeEventListener('touchend', mouseUp);
                    };

                    document.addEventListener('mousemove', mouseMove);
                    document.addEventListener('mouseup', mouseUp);
                    document.addEventListener('touchmove', mouseMove);
                    document.addEventListener('touchend', mouseUp);
                };

                // --- General Handlers ---
                const handleClick = (e) => {
                    if(props.isEditable) {
                        e.stopPropagation();
                        emit('select', props.block.id);
                    }
                };

                const handleDragStart = (e) => {
                    e.stopPropagation();
                    emit('drag-start', e);
                };

                const handleNestedDragStart = (e, blockId, zone, parentBlockId) => {
                    emit('drag-start-block', e, blockId, zone, parentBlockId);
                };

                const getDefinition = (type) => {
                    return componentLibrary.value.find(def => def.id === type) || {};
                };

                return {
                    wrapperClass: computed(() => {
                        if(!props.isEditable) return '';
                        return `relative group cursor-pointer border-2 transition-all rounded-md overflow-hidden ${props.isSelected
                            ? 'border-indigo-500 shadow-md ring-2 ring-indigo-200 ring-offset-2'
                            : 'border-transparent hover:border-indigo-300 hover:shadow-sm'
                            }`;
                    }),
                    getColumnStructure,
                    handleNestedDrop,
                    startResize,
                    handleClick,
                    handleDragStart,
                    handleNestedDragStart,
                    getDefinition,
                };
            }
        };

        // --- RESOLVE CIRCULAR DEPENDENCY ---
        // Now that both components are defined, populate their components objects
        DropZone.components = {
            'block-renderer': BlockRenderer,
            'Icon': Icon
        };

        BlockRenderer.components = {
            'drop-zone': DropZone,
            'Icon': Icon
        };

        // --- MAIN APP ---
        const app = createApp({
            components: {Icon, DropZone, BlockRenderer},
            setup() {
                // --- CONSTANTS ---
                const ZONES = {
                    HEADER: 'header',
                    FOOTER: 'footer',
                    MAIN: 'main',
                    SIDEBAR: 'sidebar'
                };

                // --- STATE ---
                const componentLibrary = ref([]);
                const layoutTemplates = ref([]);
                const pages = ref([]);
                const activePageId = ref(null);
                const viewMode = ref('editor');
                const selectedBlockId = ref(null);
                const sidebarTab = ref('pages');

                // UNIFIED STATE: All content zones (global and page-specific) in one place
                const contentZones = ref({
                    [ZONES.HEADER]: [],
                    [ZONES.FOOTER]: [],
                    [ZONES.MAIN]: [],
                    [ZONES.SIDEBAR]: []
                });

                const isLoaded = ref(false);

                // --- STATE MANAGEMENT HELPERS ---

                const findBlockAndParent = (blockId) => {
                    // Helper to search a list recursively
                    const searchList = (list, parent = null, zone = null) => {
                        for(let i = 0; i < list.length; i++) {
                            const block = list[i];
                            if(block.id === blockId) {
                                return {block, parent, list, index: i, zone};
                            }
                            if(block.children) {
                                // Check children (nested columns)
                                const result = searchList(block.children, block, zone);
                                if(result) return result;
                            }
                        }
                        return null;
                    };

                    // Search all zones in contentZones
                    for(const [zoneName, blocks] of Object.entries(contentZones.value)) {
                        const result = searchList(blocks, null, zoneName);
                        if(result) return result;
                    }

                    return null;
                };

                const updateBlock = (blockId, key, value) => {
                    const result = findBlockAndParent(blockId);
                    if(result) {
                        result.block.params[key] = value;
                    }
                };

                const getColWidths = (children) => {
                    const parentResult = findBlockAndParent(children[0]?.parent_id);
                    // Determine widths based on saved params, or calculate equal widths if no saved param exists
                    const widthsStr = parentResult?.block?.params?.col_widths ||
                        (children.length > 0 ? (100 / children.length).toFixed(1).repeat(children.length).split('.').join(', ') : '50.0, 50.0');

                    return widthsStr.split(',').map(w => parseFloat(w.trim()));
                };

                // New logic to handle setting column count and normalizing widths
                const updateColCount = (parentId, count) => {
                    if(count < 1 || count > 6) return;

                    const result = findBlockAndParent(parentId);
                    if(result) {
                        const newWidth = (100 / count).toFixed(1);
                        const newWidths = Array(count).fill(newWidth).join(', ');

                        result.block.params.col_widths = newWidths;

                        // OPTIONAL: Prune children if count decreases, but safer to let user delete manually
                        // (We only update the visual layout here; relational pruning happens on save)
                    }
                };

                // New logic to handle single width adjustment
                const updateSingleWidth = (parentId, index, newPercent) => {
                    const result = findBlockAndParent(parentId);
                    if(result) {
                        const currentWidths = result.block.params.col_widths.split(',').map(w => parseFloat(w.trim()));

                        // Limit percentage changes to sane values
                        newPercent = Math.max(5, Math.min(100, newPercent));

                        // Simple approach: Apply change directly, then normalize the *entire* list to 100%
                        currentWidths[index] = newPercent;

                        const total = currentWidths.reduce((sum, w) => sum + w, 0);

                        // Normalize all widths to sum exactly to 100%
                        const normalized = currentWidths.map(w => Math.round((w / total * 100) * 10) / 10);

                        // Store back as string
                        result.block.params.col_widths = normalized.map(w => w.toFixed(1)).join(', ');
                    }
                };

                Vue.provide('cmsState', {findBlockAndParent, updateBlock, componentLibrary, getColWidths, updateColWidths: updateBlock, updateColCount, updateSingleWidth});

                // --- COMPUTED PROPERTIES ---
                const activePage = computed(() => pages.value.find(p => p.id === activePageId.value));

                const currentLayout = computed(() => {
                    if(!activePage.value || layoutTemplates.value.length === 0) {
                        return {label: 'Standard Page', zones: []};
                    }
                    const layout = layoutTemplates.value.find(l => l.id === activePage.value.layout);
                    return layout || layoutTemplates.value.find(l => l.id === 'single') || {label: 'Standard Page', zones: []};
                });

                // Helper to get zone config by name
                const getZoneConfig = (zoneName) => {
                    if(!currentLayout.value || !currentLayout.value.zones) return null;
                    return currentLayout.value.zones.find(z => z.name === zoneName);
                };

                // Combine global + page specific for viewing
                const activeContent = computed(() => contentZones.value);

                const selectedBlock = computed(() => {
                    if(!selectedBlockId.value) return null;
                    const result = findBlockAndParent(selectedBlockId.value);
                    if(!result) return null;

                    const definition = componentLibrary.value.find(def => def.id === result.block.type);
                    return {...result.block, label: definition?.label, zone: result.zone};
                });

                // Toast notifications
                const toasts = ref([]);
                let toastIdCounter = 0;

                const showToast = (message, type = 'info', detail = null, duration = 4000) => {
                    const id = ++toastIdCounter;
                    toasts.value.push({id, message, type, detail});

                    if(duration > 0) {
                        setTimeout(() => {
                            removeToast(id);
                        }, duration);
                    }
                };

                const removeToast = (id) => {
                    const index = toasts.value.findIndex(t => t.id === id);
                    if(index > -1) {
                        toasts.value.splice(index, 1);
                    }
                };

                // Simplified (and potentially buggy for deep nesting) TOML generator for display only
                const generateConfig = computed(() => {
                    if(!activePage.value) return '';

                    let toml = `+++
title = "${activePage.value.title}"
layout = "${activePage.value.layout}"
                    status = "${activePage.value.status}"
                    url = "${activePage.value.slug}"
                    date = "${activePage.value.date || ''}"
                    description = "${activePage.value.description || ''}"
                    tags = [${activePage.value.tags ? activePage.value.tags.map(t => `"${t}"`).join(', ') : ''}]
                    +++

`;
                    // Recursive function to render block TOML
                    const renderBlockToml = (blocks, zoneName, depth = 0) => {
                        let output = '';
                        const indent = "  ".repeat(depth);

                        blocks.forEach(b => {
                            output += `${indent}[[${zoneName}]]\n`;
                            output += `${indent}  type = "${b.type}"\n`;

                            // 1. Render immediate params (skip complex objects/arrays)
                            Object.entries(b.params).forEach(([k, v]) => {
                                // Skip complex types that need special handling
                                if(typeof v === 'object' && v !== null) {
                                    return; // Skip arrays and objects
                                }
                                output += `${indent}  ${k} = "${v}"\n`;
                            });

                            // 2. Handle menu-specific complex parameters
                            if(b.type === 'menu') {
                                // Render menu items as TOML array of tables
                                if(b.params.items && Array.isArray(b.params.items)) {
                                    b.params.items.forEach(item => {
                                        output += `${indent}  [[menu.items]]\n`;
                                        output += `${indent}    label = "${item.label}"\n`;
                                        output += `${indent}    url = "${item.url}"\n`;
                                        output += `${indent}    type = "${item.type}"\n`;
                                    });
                                }

                                // Render sidebar footer blocks recursively
                                if(b.params.sidebarFooterBlocks && Array.isArray(b.params.sidebarFooterBlocks) && b.params.sidebarFooterBlocks.length > 0) {
                                    output += renderBlockToml(b.params.sidebarFooterBlocks, 'menu.sidebarFooterBlocks', depth + 1);
                                }
                            }

                            // 3. Render nested children (e.g., columns)
                            if(b.type === 'flex_columns') {

                                output += `${indent}  widths = [${b.params.col_widths}]\n`; // Use col_widths from parent params

                                // Group children blocks by column (col_0, col_1, etc.)
                                const widthsStr = b.params.col_widths || '';
                                const numCols = widthsStr.split(',').length;

                                for(let colIndex = 0; colIndex < numCols; colIndex++) {
                                    const placement_key = `col_${colIndex}`;
                                    const colBlocks = b.children.filter(c => c.placement_key === placement_key).sort((a, b) => a.sort_order - b.sort_order);

                                    if(colBlocks.length > 0) {
                                        output += `${indent}  [${placement_key}]\n`;
                                        // Render blocks inside this column structure
                                        output += renderBlockToml(colBlocks, 'block', depth + 2);
                                    }
                                }
                            }
                            output += '\n';
                        });
                        return output;
                    };

                    // Render Global Zones
                    if(contentZones.value.header.length > 0) {
                        toml += `# Site Header Blocks (Global)\n`;
                        toml += renderBlockToml(contentZones.value.header, 'header');
                    }
                    if(contentZones.value.footer.length > 0) {
                        toml += `# Site Footer Blocks (Global)\n`;
                        toml += renderBlockToml(contentZones.value.footer, 'footer');
                    }

                    // Render Main Page Content
                    if(activeContent.value.main.length > 0) {
                        toml += `# Page Content Blocks (Main)\n`;
                        toml += renderBlockToml(activeContent.value.main, 'main');
                    }

                    // Render Sidebar Content
                    if(activeContent.value.sidebar.length > 0) {
                        toml += `\n# Sidebar Blocks\n`;
                        toml += renderBlockToml(activeContent.value.sidebar, 'sidebar');
                    }

                    return toml;
                });

                // --- API & DATA FETCHING ---

                const fetchApi = async (url, method = 'GET', data = null) => {
                    const headers = {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken(),
                    };

                    const config = {
                        method,
                        headers,
                    };
                    if(data) {
                        config.body = JSON.stringify(data);
                    }

                    const response = await fetch(url, config);
                    if(!response.ok) {
                        throw new Error(`API Error: ${response.statusText}`);
                    }
                    return response.json();
                };

                const fetchContent = async (pageId) => {
                    const url = `${API_BASE_URL}pages/${pageId}/content/`;
                    const blocks = await fetchApi(url) || [];

                    // Populate page-specific zones in contentZones
                    contentZones.value.main = blocks.filter(b => b.placement_key === 'main' || !b.placement_key).sort((a, b) => a.sort_order - b.sort_order);
                    contentZones.value.sidebar = blocks.filter(b => b.placement_key === 'sidebar').sort((a, b) => a.sort_order - b.sort_order);
                };

                const initialLoad = async () => {
                    try {
                        const response = await fetchApi(`${API_BASE_URL}init/`);
                        componentLibrary.value = response.definitions;
                        layoutTemplates.value = response.layouts;

                        // Populate global zones in contentZones
                        contentZones.value.header = response.header;
                        contentZones.value.footer = response.footer;

                        const pagesResponse = await fetchApi(`${API_BASE_URL}pages/`);
                        pages.value = pagesResponse;

                        if(pages.value.length > 0) {
                            activePageId.value = pages.value[0].id;
                            await fetchContent(activePageId.value);
                        }
                    } catch(error) {
                        console.error('Failed to load CMS data:', error);
                    } finally {
                        isLoaded.value = true;
                    }
                };

                // --- LIFECYCLE ---
                onMounted(() => {
                    initialLoad();
                });

                // Watch activePageId to load new main content
                watch(activePageId, async (newId) => {
                    if(newId) {
                        // Fetch content to populate page-specific zones in contentZones
                        await fetchContent(newId);
                    }
                });

                // --- ACTIONS ---
                const setActivePage = (id) => {
                    activePageId.value = id;
                    selectedBlockId.value = null;
                };

                const createNewPage = async () => {
                    try {
                        const newPage = {
                            title: 'New Page',
                            slug: 'new-page-' + Date.now(),
                            layout: 'single',
                            status: 'draft',
                            date: new Date().toISOString().split('T')[0],
                            description: '',
                            tags: []
                        };

                        const response = await fetchApi(`${API_BASE_URL}pages/`, 'POST', newPage);
                        pages.value.push(response);
                        activePageId.value = response.id;
                    } catch(error) {
                        console.error('Error creating page:', error);
                        alert('Failed to create new page. Please try again.');
                    }
                };
                const savePageContent = async () => {
                    if(!activePage.value) return;

                    try {
                        const pageId = activePage.value.id;
                        const metadataPayload = {
                            title: activePage.value.title,
                            slug: activePage.value.slug,
                            layout: activePage.value.layout,
                            status: activePage.value.status,
                            date: activePage.value.date,
                            description: activePage.value.description,
                            tags: activePage.value.tags,
                        };

                        // 1. Save Page Metadata (PUT)
                        await fetchApi(`${API_BASE_URL}pages/${pageId}/`, 'PUT', metadataPayload);

                        // 2. Save Block Content (POST to custom action)
                        // Collect page-specific blocks from contentZones
                        const allPageBlocks = [
                            ...contentZones.value.main.map(b => ({...b, placement_key: 'main'})),
                            ...contentZones.value.sidebar.map(b => ({...b, placement_key: 'sidebar'}))
                        ];
                        const contentPayload = {blocks: allPageBlocks};
                        await fetchApi(`${API_BASE_URL}pages/${pageId}/save_content/`, 'POST', contentPayload);

                        // 3. Save Global Content (POST to init action)
                        const globalPayload = {
                            header: contentZones.value.header,
                            footer: contentZones.value.footer
                        };
                        await fetchApi(`${API_BASE_URL}init/save_globals/`, 'POST', globalPayload);

                        showToast('Content saved successfully', 'success');
                    } catch(error) {
                        console.error("Save Error:", error);
                        showToast('Failed to save content', 'error', error.message);
                    }
                };

                // Helper to generate UUIDs
                const generateId = () => uuid.v4();

                // --- DRAG & DROP HANDLERS ---

                // Helper to insert a block into the correct position within a zone or column
                const insertIntoCorrectPosition = (list, newBlock, targetZone, targetIndex) => {
                    if(!targetZone.startsWith('col_')) {
                        // Top-level insertion (Header, Footer, Main, Sidebar)
                        newBlock.placement_key = targetZone;

                        if(targetIndex < list.length) {
                            list.splice(targetIndex, 0, newBlock);
                        } else {
                            list.push(newBlock);
                        }

                        // Update sort_order for all blocks in this zone
                        list.forEach((b, index) => {
                            b.sort_order = index;
                        });

                    } else {
                        // Nested insertion into flex column
                        const currentColBlocks = list.filter(b => b.placement_key === targetZone)
                            .sort((a, b) => a.sort_order - b.sort_order);

                        if(currentColBlocks.length === 0) {
                            list.push(newBlock);
                        } else if(targetIndex < currentColBlocks.length) {
                            const blockToInsertBefore = currentColBlocks[targetIndex];
                            const actualIndex = list.findIndex(b => b.id === blockToInsertBefore.id);
                            list.splice(actualIndex, 0, newBlock);
                        } else {
                            list.push(newBlock);
                        }

                        // Update sort_order for nested blocks
                        let currentSortOrder = 0;
                        list.forEach(b => {
                            if(b.placement_key === targetZone) {
                                b.sort_order = currentSortOrder++;
                            }
                        });
                    }
                };

                // Helper to find the mutable array reference for blocks within a zone/column
                function findMutableBlockArray(zone, parentBlockId) {
                    // Handle menu footer zones (nested within menu block)
                    if(zone.startsWith('menu_footer_')) {
                        const menuBlockId = zone.replace('menu_footer_', '');
                        const result = findBlockAndParent(menuBlockId);
                        if(result && result.block) {
                            if(!result.block.params.sidebarFooterBlocks) {
                                result.block.params.sidebarFooterBlocks = [];
                            }
                            return result.block.params.sidebarFooterBlocks;
                        }
                        console.error('Menu block not found for footer zone:', zone);
                        return null;
                    }

                    // Handle column zones (nested within columns block)
                    if(zone.startsWith('col_') && parentBlockId) {
                        const result = findBlockAndParent(parentBlockId);
                        if(result && result.block && result.block.type === 'columns') {
                            const colIndex = parseInt(zone.split('_')[1]);
                            if(!result.block.params.columns[colIndex]) {
                                result.block.params.columns[colIndex] = {blocks: []};
                            }
                            if(!result.block.params.columns[colIndex].blocks) {
                                result.block.params.columns[colIndex].blocks = [];
                            }
                            return result.block.params.columns[colIndex].blocks;
                        }
                        return null;
                    }

                    // Handle top-level zones
                    if(contentZones.value[zone]) {
                        return contentZones.value[zone];
                    }

                    console.error('No mutation list found for zone:', zone);
                    return null;
                }

                const handleDragStartNew = (e, type) => {
                    e.dataTransfer.setData('type', type);
                    e.dataTransfer.setData('source', 'sidebar');
                };

                const handleDragStartExisting = (e, blockId, zone, parentBlockId) => {
                    e.dataTransfer.setData('blockId', blockId);
                    e.dataTransfer.setData('zone', zone);
                    e.dataTransfer.setData('parentBlockId', parentBlockId || '');
                    e.dataTransfer.setData('source', 'canvas');
                };

                const handleDrop = (e, targetZone, targetIndex, parentBlockId) => {
                    e.preventDefault();
                    const source = e.dataTransfer.getData('source');
                    const mutationList = findMutableBlockArray(targetZone, parentBlockId);

                    if(!mutationList) {
                        console.error('No mutation list found for zone:', targetZone);
                        return;
                    }

                    if(source === 'sidebar') {
                        // New block from component library
                        const type = e.dataTransfer.getData('type');
                        const definition = componentLibrary.value.find(c => c.id === type);

                        const newBlock = {
                            id: generateId(),
                            type: type,
                            params: {...definition.default_params},
                            children: type === 'flex_columns' ? [] : null,
                            placement_key: targetZone,
                            parent_id: parentBlockId || null,
                        };

                        if(type === 'flex_columns') {
                            newBlock.params.col_widths = newBlock.params.col_widths || '50.0, 50.0';
                        }

                        insertIntoCorrectPosition(mutationList, newBlock, targetZone, targetIndex);
                        selectedBlockId.value = newBlock.id;
                    }
                    else if(source === 'canvas') {
                        // Move existing block
                        const blockId = e.dataTransfer.getData('blockId');
                        const sourceResult = findBlockAndParent(blockId);

                        if(!sourceResult) {
                            console.error('Source block not found:', blockId);
                            return;
                        }

                        const sourceList = sourceResult.list;
                        const blockIndex = sourceResult.index;
                        const [movedBlock] = sourceList.splice(blockIndex, 1);

                        movedBlock.placement_key = targetZone;
                        movedBlock.parent_id = parentBlockId || null;

                        insertIntoCorrectPosition(mutationList, movedBlock, targetZone, targetIndex);
                    }
                };

                const deleteBlock = (blockId) => {
                    const result = findBlockAndParent(blockId);
                    if(result && result.list) {
                        result.list.splice(result.index, 1);
                    }
                    selectedBlockId.value = null;
                };

                // --- UTILITIES ---
                const formatKey = (key) => key.replace(/([A-Z])/g, ' $1').trim();

                // Provide helper to global scope for debugging/reuse
                if(typeof window !== 'undefined') {
                    window.findBlock = findBlockAndParent;
                }

                return {
                    isLoaded,
                    pages,
                    activePageId,
                    viewMode,
                    activePage,
                    activeContent,
                    selectedBlockId,
                    selectedBlock,
                    componentLibrary,
                    generateConfig,
                    setActivePage,
                    createNewPage,
                    savePageContent,
                    publishSite: async () => {
                        try {
                            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value ||
                                getCookie('csrftoken');

                            const response = await fetch('/api/pages/publish/', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-CSRFToken': csrfToken
                                },
                                body: JSON.stringify({})
                            });

                            const data = await response.json();

                            if(data.success) {
                                showToast(
                                    `Successfully published ${data.files.length} files`,
                                    'success',
                                    `Output: ${data.output_dir}`,
                                    6000
                                );
                            } else {
                                showToast('Publish failed', 'error', data.error);
                            }
                        } catch(error) {
                            console.error('Publish error:', error);
                            showToast('Publish failed', 'error', error.message);
                        }
                    },
                    toasts,
                    showToast,
                    removeToast,
                    handleDragStartNew,
                    handleDragStartExisting,
                    handleDrop,
                    updateBlockParams: updateBlock,
                    deleteBlock,
                    formatKey,
                    setSelectedBlockId: (id) => selectedBlockId.value = id,
                    getColWidths,
                    updateColWidths: updateBlock,
                    updateColCount,
                    updateSingleWidth,
                    sidebarTab,
                    currentLayout,
                    layoutTemplates,
                    getZoneConfig
                };
            }
        });

        app.mount('#app');
    </script>

<div class="max-w-3xl mx-auto p-6">
    {{ if .title }}<h2 class="text-2xl font-bold text-center mb-8 text-base-content">{{ .title }}</h2>{{ end }}
    <div class="space-y-4">
        {{ range $index, $element := .items }}{{ with $element }}
        <div class="collapse collapse-arrow bg-base-100 border border-base-200 rounded-box">
            {{ if $.allow_multiple }}
            <input type="checkbox" id="accordion-{{ $.id }}-{{ $index }}" />
            {{else}}
            <input type="radio" name="accordion-{{ $.id }}" id="accordion-{{ $.id }}-{{ $index }}" />
            {{ end }}
            <label for="accordion-{{ $.id }}-{{ $index }}"
                class="collapse-title text-xl font-medium text-base-content cursor-pointer">
                {{ .title }}
            </label>
            <div class="collapse-content text-base-content/80">
                <p>{{ .content }}</p>
            </div>
        </div>
        {{ end }}{{ end }}
    </div>
    {{ if not .items }}
    <div class="text-center text-base-content/40 py-8 border-2 border-dashed border-base-200 rounded-lg">
        Add accordion items via the sidebar editor
    </div>
    {{ end }}
</div>

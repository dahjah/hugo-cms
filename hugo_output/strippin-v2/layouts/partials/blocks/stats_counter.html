<div class="py-12 bg-base-300">
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {{ range $index, $element := .stats }}{{ with $element }}
            <div class="bg-base-100 rounded-lg shadow-md p-6 text-center border border-base-300">
                {{ if .icon }}
                <div class="text-primary text-4xl mb-2">
                    <span>★</span>
                </div>
                {{ end }}
                <div class="text-sm font-medium opacity-60 uppercase tracking-wide mb-2">{{ .label }}</div>
                <div class="text-4xl font-bold text-primary mb-1">
                    {{ .value }}{{ if .suffix }}<span class="text-2xl">{{ .suffix }}</span>{{ end }}
                </div>
                {{ if .description }}
                <div class="text-sm opacity-70">{{ .description }}</div>
                {{ end }}
            </div>
            {{ end }}{{ end }}
        </div>
    </div>
</div>

<div class="p-6">
    <div class="grid gap-6" style="grid-template-columns: repeat({{ .columns }}, minmax(0, 1fr));">
        {{ range $index, $element := .cards }}{{ with $element }}
        <div class="group h-64 perspective-1000">
            <div class="relative w-full h-full transition-all duration-500 preserve-3d group-hover:my-rotate-y-180">
                <div
                    class="absolute inset-0 backface-hidden bg-base-100 p-6 rounded-lg shadow-md flex flex-col items-center justify-center text-center border border-base-200">
                    {{ if .front_icon }}
                    <div
                        class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4 text-primary">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            {{ partial "helpers/icon.html" (dict "name" .front_icon) | safeHTML }}
                        </svg>
                    </div>
                    {{ end }}
                    <h3 class="text-xl font-bold text-base-content">{{ .front_title }}</h3>
                </div>
                <div
                    class="absolute inset-0 backface-hidden my-rotate-y-180 bg-primary p-6 rounded-lg shadow-md flex flex-col items-center justify-center text-center text-primary-content">
                    <p class="text-sm mb-4">{{ .back_description }}</p>
                    {{ if .back_cta_text }}
                    <a href="{{ .back_cta_url }}"
                        class="btn btn-sm btn-outline btn-active bg-base-100 text-base-content border-none hover:bg-base-200">
                        {{ .back_cta_text }}
                    </a>
                    {{ end }}
                </div>
            </div>
        </div>
        {{ end }}{{ end }}
    </div>
    {{ if not .cards }}
    <div class="text-center text-slate-400 py-8 border-2 border-dashed border-slate-200 rounded-lg">
        Add cards via the sidebar editor
    </div>
    {{ end }}
</div>

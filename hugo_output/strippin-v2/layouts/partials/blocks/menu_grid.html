<div class="p-6 bg-base-100 rounded-lg">
    {{ if .title }}<h2 class="text-2xl font-bold text-center mb-8 text-base-content">{{ .title }}</h2>{{ end }}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        {{ range $index, $element := .items }}{{ with $element }}
        <div class="bg-base-100 rounded-lg overflow-hidden shadow-md">
            {{ if .image }}<img src="{{ .image }}" alt="{{ .name }}" class="w-full h-32 object-cover" />{{ end }}
            <div class="p-3">
                <h4 class="font-semibold text-base-content mb-1">{{ .name }}</h4>
                {{ if .description }}<p class="text-xs text-base-content/70">{{ .description }}</p>{{ end }}
            </div>
        </div>
        {{ end }}{{ end }}
    </div>
    {{ if not .items }}
    <div class="text-center text-base-content/40 py-8">
        No menu items added yet
    </div>
    {{ end }}
</div>

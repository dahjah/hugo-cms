<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-base-200 text-base-content font-sans min-h-screen flex flex-col" data-theme="{{ .Site.Params.theme_preset }}">
    <div id="debug-info" data-theme="fantasy" style="background: #333; color: #fff; padding: 10px; font-family: monospace; z-index: 9999; position: relative; display: none;">
        <strong>DEBUG INFO:</strong> <span class="badge badge-primary">Theme: fantasy</span><br>
        Theme Preset: [{{ site.Params.theme_preset }}]<br>
    </div>
    <script>
        if (new URLSearchParams(window.location.search).get('debug') === 'true') {
            document.getElementById('debug-info').style.display = 'block';
        }
    </script>
    {{ block "main" . }}{{ end }}
</body>
</html>

<div class="py-12 {{ .css_classes }}">
    {{ if .title }}<h2 class="text-3xl font-bold text-center mb-8 text-base-content">{{ .title }}</h2>{{ end }}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 container mx-auto px-4">
        {{ range $index, $element := .images }}{{ with $element }}
        <div class="relative group overflow-hidden rounded-lg aspect-square bg-base-300">
            <img src="{{ .src }}" alt="{{ .alt }}"
                class="object-cover w-full h-full transition-transform duration-300 group-hover:scale-110">
            {{ if .caption }}
            <div
                class="absolute bottom-0 left-0 right-0 bg-base-100/90 text-base-content p-2 text-sm transform translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                {{ .caption }}
            </div>
            {{ end }}
        </div>
        {{ end }}{{ end }}
    </div>
</div>

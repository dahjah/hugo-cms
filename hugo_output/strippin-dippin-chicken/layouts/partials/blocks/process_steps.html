<div class="p-6 bg-base-200 rounded-lg">
    {{ if .title }}<h2 class="text-2xl font-bold text-center mb-8 text-base-content">{{ .title }}</h2>{{ end }}
    <div class="space-y-6 max-w-2xl mx-auto">
        {{ range $index, $element := .steps }}{{ with $element }}
        <div class="flex gap-4 items-start">
            <div
                class="flex-shrink-0 w-10 h-10 rounded-full bg-primary text-primary-content flex items-center justify-center font-bold">
                {{ add $index 1 }}
            </div>
            <div class="flex-1">
                <h3 class="text-xl font-semibold mb-1 text-base-content">{{ .title }}</h3>
                <p class="text-base-content/70">{{ .description }}</p>
            </div>
        </div>
        {{ end }}{{ end }}
    </div>
    {{ if not .steps }}
    <div class="text-center text-slate-400 py-8">No steps added yet</div>
    {{ end }}
</div>
